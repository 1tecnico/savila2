<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mochila Escolar</title>

<style>

body{
font-family: Arial, sans-serif;
margin:0;
background:#e6edf5;
}

header{
background:#0b2545;
color:white;
text-align:center;
padding:20px;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

input{
padding:8px;
border-radius:6px;
border:1px solid #ccc;
margin:5px 0;
}

button{
padding:8px 12px;
border:none;
border-radius:6px;
cursor:pointer;
}

.add{
background:#134074;
color:white;
}

.delete{
background:#c1121f;
color:white;
}

.materia{
background:white;
padding:15px;
border-radius:10px;
margin-top:15px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.tarefa{
display:flex;
justify-content:space-between;
margin-top:5px;
}

.concluida{
text-decoration:line-through;
color:gray;
}

</style>
</head>

<body>

<header>
<h1>🎒 Mochila Escolar Digital</h1>
</header>

<div class="container">

<input id="materiaInput" placeholder="Nome da matéria">
<button class="add" id="addMateriaBtn">Adicionar matéria</button>

<div id="listaMaterias"></div>

</div>

<script>

let materias = JSON.parse(localStorage.getItem("materias")) || [];

const inputMateria = document.getElementById("materiaInput");
const botaoMateria = document.getElementById("addMateriaBtn");
const lista = document.getElementById("listaMaterias");

function salvar(){
localStorage.setItem("materias", JSON.stringify(materias));
}

function render(){

lista.innerHTML="";

materias.forEach((materia, i)=>{

const divMateria = document.createElement("div");
divMateria.className = "materia";

const titulo = document.createElement("h2");
titulo.textContent = materia.nome;

const inputTarefa = document.createElement("input");
inputTarefa.placeholder = "Nova tarefa";

const btnAddTarefa = document.createElement("button");
btnAddTarefa.textContent = "Adicionar tarefa";
btnAddTarefa.className = "add";

btnAddTarefa.onclick = function(){

const nome = inputTarefa.value.trim();
if(nome==="") return;

materia.tarefas.push({
nome:nome,
concluida:false
});

inputTarefa.value="";

salvar();
render();

};

const btnExcluirMateria = document.createElement("button");
btnExcluirMateria.textContent = "Excluir matéria";
btnExcluirMateria.className = "delete";

btnExcluirMateria.onclick = function(){

materias.splice(i,1);

salvar();
render();

};

divMateria.appendChild(titulo);
divMateria.appendChild(inputTarefa);
divMateria.appendChild(btnAddTarefa);
divMateria.appendChild(btnExcluirMateria);

materia.tarefas.forEach((tarefa, j)=>{

const divTarefa = document.createElement("div");
divTarefa.className = "tarefa";

const texto = document.createElement("span");
texto.textContent = tarefa.nome;

if(tarefa.concluida){
texto.classList.add("concluida");
}

const btnConcluir = document.createElement("button");
btnConcluir.textContent = "✔";

btnConcluir.onclick = function(){

tarefa.concluida = !tarefa.concluida;

salvar();
render();

};

const btnExcluirTarefa = document.createElement("button");
btnExcluirTarefa.textContent = "X";
btnExcluirTarefa.className = "delete";

btnExcluirTarefa.onclick = function(){

materia.tarefas.splice(j,1);

salvar();
render();

};

const areaBotoes = document.createElement("div");
areaBotoes.appendChild(btnConcluir);
areaBotoes.appendChild(btnExcluirTarefa);

divTarefa.appendChild(texto);
divTarefa.appendChild(areaBotoes);

divMateria.appendChild(divTarefa);

});

lista.appendChild(divMateria);

});

}

botaoMateria.addEventListener("click", function(){

const nome = inputMateria.value.trim();

if(nome==="") return;

materias.push({
nome:nome,
tarefas:[]
});

inputMateria.value="";

salvar();
render();

});

render();

</script>

</body>
</html>
