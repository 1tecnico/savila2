<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Mochila Digital</title>

<style>

body{
font-family: Arial, sans-serif;
margin:0;
background:#1e3a5f;
color:white;
}

header{
background:#132a44;
padding:15px;
text-align:center;
font-size:24px;
}

.menu{
display:flex;
background:#16365c;
}

.menu button{
flex:1;
padding:12px;
background:#16365c;
border:none;
color:white;
cursor:pointer;
}

.menu button:hover{
background:#28507f;
}

.aba{
display:none;
padding:20px;
}

.ativa{
display:block;
}

input{
padding:8px;
margin:5px;
border:none;
border-radius:4px;
}

button{
padding:6px 10px;
margin:5px;
border:none;
border-radius:4px;
background:#28507f;
color:white;
cursor:pointer;
}

button:hover{
background:#3a6da8;
}

.item{
background:#16365c;
padding:10px;
margin:8px 0;
border-radius:5px;
}

</style>
</head>

<body>

<header>🎒 Mochila Digital</header>

<div class="menu">
<button onclick="abrir('materias')">Matérias</button>
<button onclick="abrir('horarios')">Horários</button>
<button onclick="abrir('tarefas')">Tarefas</button>
</div>

<!-- MATERIAS -->
<div id="materias" class="aba ativa">

<h2>Matérias</h2>

<input id="materiaInput" placeholder="Nova matéria">
<button onclick="addMateria()">Adicionar</button>

<div id="materiaLista"></div>

</div>

<!-- HORARIOS -->
<div id="horarios" class="aba">

<h2>Horários</h2>

<input id="horarioMateria" placeholder="Matéria">
<input id="horarioHora" placeholder="Ex: Segunda 08:00">
<button onclick="addHorario()">Adicionar</button>

<div id="horarioLista"></div>

</div>

<!-- TAREFAS -->
<div id="tarefas" class="aba">

<h2>Tarefas</h2>

<input id="tarefaInput" placeholder="Nova tarefa">
<button onclick="addTarefa()">Adicionar</button>

<div id="tarefaLista"></div>

</div>

<script>

let materias = JSON.parse(localStorage.getItem("materias")) || [];
let horarios = JSON.parse(localStorage.getItem("horarios")) || [];
let tarefas = JSON.parse(localStorage.getItem("tarefas")) || [];

function salvar(){
localStorage.setItem("materias",JSON.stringify(materias));
localStorage.setItem("horarios",JSON.stringify(horarios));
localStorage.setItem("tarefas",JSON.stringify(tarefas));
}

function abrir(id){

document.querySelectorAll(".aba").forEach(a=>{
a.classList.remove("ativa");
});

document.getElementById(id).classList.add("ativa");

}

function renderMaterias(){

let lista = document.getElementById("materiaLista");
lista.innerHTML="";

materias.forEach((m,i)=>{

let div=document.createElement("div");
div.className="item";
div.innerHTML=m+" <button onclick='delMateria("+i+")'>Excluir</button>";
lista.appendChild(div);

});

}

function addMateria(){

let input=document.getElementById("materiaInput");

if(input.value!=""){
materias.push(input.value);
input.value="";
salvar();
renderMaterias();
}

}

function delMateria(i){
materias.splice(i,1);
salvar();
renderMaterias();
}

function renderHorarios(){

let lista=document.getElementById("horarioLista");
lista.innerHTML="";

horarios.forEach((h,i)=>{

let div=document.createElement("div");
div.className="item";
div.innerHTML=h.materia+" - "+h.hora+" <button onclick='delHorario("+i+")'>Excluir</button>";
lista.appendChild(div);

});

}

function addHorario(){

let m=document.getElementById("horarioMateria");
let h=document.getElementById("horarioHora");

if(m.value!="" && h.value!=""){

horarios.push({materia:m.value,hora:h.value});

m.value="";
h.value="";

salvar();
renderHorarios();

}

}

function delHorario(i){
horarios.splice(i,1);
salvar();
renderHorarios();
}

function renderTarefas(){

let lista=document.getElementById("tarefaLista");
lista.innerHTML="";

tarefas.forEach((t,i)=>{

let div=document.createElement("div");
div.className="item";
div.innerHTML=t+" <button onclick='delTarefa("+i+")'>Excluir</button>";
lista.appendChild(div);

});

}

function addTarefa(){

let input=document.getElementById("tarefaInput");

if(input.value!=""){
tarefas.push(input.value);
input.value="";
salvar();
renderTarefas();
}

}

function delTarefa(i){
tarefas.splice(i,1);
salvar();
renderTarefas();
}

renderMaterias();
renderHorarios();
renderTarefas();

</script>

</body>
</html>
