<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mochila Escolar</title>

<style>
body{
font-family: Arial, sans-serif;
margin:0;
background:#e6edf5;
}

header{
background:#0b2545;
color:white;
text-align:center;
padding:20px;
}

.container{
max-width:800px;
margin:auto;
padding:20px;
}

input{
padding:10px;
width:70%;
border-radius:8px;
border:1px solid #ccc;
}

button{
padding:10px 15px;
border:none;
border-radius:8px;
background:#134074;
color:white;
cursor:pointer;
}

.materia{
background:white;
padding:15px;
border-radius:10px;
margin-top:15px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}
</style>
</head>

<body>

<header>
<h1>🎒 Mochila Escolar Digital</h1>
</header>

<div class="container">

<input id="materiaInput" placeholder="Digite o nome da matéria">
<button id="btnAdicionar">Adicionar</button>

<div id="listaMaterias"></div>

</div>

<script>

const input = document.getElementById("materiaInput");
const botao = document.getElementById("btnAdicionar");
const lista = document.getElementById("listaMaterias");

botao.addEventListener("click", function(){

const nome = input.value.trim();

if(nome === "") return;

const div = document.createElement("div");
div.className = "materia";
div.textContent = nome;

lista.appendChild(div);

input.value = "";

});

</script>

</body>
</html>
