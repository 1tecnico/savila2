<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mochila Escolar</title>

<style>

body{
font-family:Arial;
margin:0;
background:#e8eef5;
}

header{
background:#0b2545;
color:white;
text-align:center;
padding:20px;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

form{
margin-bottom:20px;
}

input{
padding:10px;
border-radius:8px;
border:1px solid #ccc;
width:70%;
}

button{
padding:10px;
border:none;
border-radius:8px;
cursor:pointer;
}

.add{
background:#134074;
color:white;
}

.delete{
background:#c1121f;
color:white;
}

.materia{
background:white;
padding:15px;
border-radius:10px;
margin-top:15px;
box-shadow:0 3px 8px rgba(0,0,0,0.1);
}

.materia h2{
margin-top:0;
color:#0b2545;
}

.tarefa{
display:flex;
justify-content:space-between;
margin-top:5px;
}

.concluida{
text-decoration:line-through;
color:gray;
}

</style>
</head>

<body>

<header>
<h1>🎒 Mochila Escolar Digital</h1>
<p>Organize suas matérias e tarefas</p>
</header>

<div class="container">

<form id="formMateria">
<input id="materiaInput" placeholder="Nome da matéria">
<button class="add" type="submit">Adicionar matéria</button>
</form>

<div id="listaMaterias"></div>

</div>

<script>

let materias = JSON.parse(localStorage.getItem("materias")) || [];

function salvar(){
localStorage.setItem("materias", JSON.stringify(materias));
}

function render(){

const container = document.getElementById("listaMaterias");
container.innerHTML="";

materias.forEach((m,i)=>{

let div = document.createElement("div");
div.className="materia";

let tarefasHTML="";

m.tarefas.forEach((t,j)=>{

tarefasHTML+=`
<div class="tarefa">
<span class="${t.concluida ? 'concluida':''}">${t.nome}</span>

<div>
<button onclick="concluir(${i},${j})">✔</button>
<button class="delete" onclick="excluirTarefa(${i},${j})">X</button>
</div>

</div>
`;

});

div.innerHTML=`

<h2>${m.nome}</h2>

<input id="tarefa${i}" placeholder="Nova tarefa">
<button onclick="addTarefa(${i})">Adicionar</button>
<button class="delete" onclick="excluirMateria(${i})">Excluir matéria</button>

${tarefasHTML}

`;

container.appendChild(div);

});

salvar();

}

document.getElementById("formMateria").addEventListener("submit", function(e){

e.preventDefault();

const input = document.getElementById("materiaInput");
const nome = input.value.trim();

if(nome==="") return;

materias.push({
nome:nome,
tarefas:[]
});

input.value="";

render();

});

function excluirMateria(i){
materias.splice(i,1);
render();
}

function addTarefa(i){

let input = document.getElementById("tarefa"+i);
let nome = input.value.trim();

if(nome==="") return;

materias[i].tarefas.push({
nome:nome,
concluida:false
});

input.value="";

render();

}

function concluir(i,j){

materias[i].tarefas[j].concluida =
!materias[i].tarefas[j].concluida;

render();

}

function excluirTarefa(i,j){

materias[i].tarefas.splice(j,1);

render();

}

render();

</script>

</body>
</html>
