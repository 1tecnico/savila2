<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mochila Escolar Digital</title>

<style>

body{
font-family: Arial, sans-serif;
margin:0;
background:#e6edf5;
}

header{
background:#0b2545;
color:white;
text-align:center;
padding:20px;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

input{
padding:8px;
border-radius:6px;
border:1px solid #ccc;
margin:5px 0;
}

button{
padding:8px 12px;
border:none;
border-radius:6px;
cursor:pointer;
margin-left:5px;
}

.add{
background:#134074;
color:white;
}

.delete{
background:#c1121f;
color:white;
}

.materia{
background:white;
padding:15px;
border-radius:10px;
margin-top:15px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.tarefa{
display:flex;
justify-content:space-between;
margin-top:5px;
}

.concluida{
text-decoration:line-through;
color:gray;
}

</style>
</head>

<body>

<header>
<h1>🎒 Mochila Escolar Digital</h1>
</header>

<div class="container">

<input id="materiaInput" placeholder="Nome da matéria">
<button class="add" onclick="addMateria()">Adicionar matéria</button>

<div id="listaMaterias"></div>

</div>

<script>

let materias = JSON.parse(localStorage.getItem("materias")) || [];

function salvar(){
localStorage.setItem("materias", JSON.stringify(materias));
}

function render(){

const container = document.getElementById("listaMaterias");
container.innerHTML="";

materias.forEach((m,i)=>{

let tarefasHTML="";

m.tarefas.forEach((t,j)=>{

tarefasHTML+=`
<div class="tarefa">
<span class="${t.concluida ? 'concluida':''}">${t.nome}</span>

<div>
<button onclick="concluir(${i},${j})">✔</button>
<button class="delete" onclick="excluirTarefa(${i},${j})">X</button>
</div>
</div>
`;

});

const div=document.createElement("div");
div.className="materia";

div.innerHTML=`

<h2>${m.nome}</h2>

<input id="tarefa${i}" placeholder="Nova tarefa">
<button class="add" onclick="addTarefa(${i})">Adicionar</button>
<button class="delete" onclick="excluirMateria(${i})">Excluir matéria</button>

${tarefasHTML}

`;

container.appendChild(div);

});

salvar();

}

function addMateria(){

const input=document.getElementById("materiaInput");
const nome=input.value.trim();

if(nome==="") return;

materias.push({
nome:nome,
tarefas:[]
});

input.value="";

render();

}

function excluirMateria(i){

materias.splice(i,1);

render();

}

function addTarefa(i){

const input=document.getElementById("tarefa"+i);
const nome=input.value.trim();

if(nome==="") return;

materias[i].tarefas.push({
nome:nome,
concluida:false
});

input.value="";

render();

}

function excluirTarefa(i,j){

materias[i].tarefas.splice(j,1);

render();

}

function concluir(i,j){

materias[i].tarefas[j].concluida =
!materias[i].tarefas[j].concluida;

render();

}

render();

</script>

</body>
</html>
