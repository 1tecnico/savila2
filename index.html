<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Mochila Digital</title>

<style>
body{
font-family:Arial;
margin:0;
background:#1e3a5f;
color:white;
}

header{
background:#132a44;
padding:15px;
text-align:center;
font-size:22px;
}

.menu{
display:flex;
background:#16365c;
}

.menu button{
flex:1;
padding:10px;
border:none;
background:#16365c;
color:white;
cursor:pointer;
}

.menu button:hover{
background:#2e5a8a;
}

.aba{
display:none;
padding:20px;
}

.ativa{
display:block;
}

input{
padding:6px;
margin:5px;
}

button{
padding:6px 10px;
margin:5px;
cursor:pointer;
}

.item{
background:#16365c;
padding:8px;
margin:6px 0;
}
</style>

</head>

<body>

<header>🎒 Mochila Digital</header>

<div class="menu">
<button onclick="abrir('materias')">Matérias</button>
<button onclick="abrir('horarios')">Horários</button>
<button onclick="abrir('tarefas')">Tarefas</button>
</div>

<div id="materias" class="aba ativa">
<h2>Matérias</h2>

<input id="materia">
<button onclick="addMateria()">Adicionar</button>

<div id="listaMaterias"></div>
</div>

<div id="horarios" class="aba">
<h2>Horários</h2>

<input id="horario">
<button onclick="addHorario()">Adicionar</button>

<div id="listaHorarios"></div>
</div>

<div id="tarefas" class="aba">
<h2>Tarefas</h2>

<input id="tarefa">
<button onclick="addTarefa()">Adicionar</button>

<div id="listaTarefas"></div>
</div>

<script>

let materias=[]
let horarios=[]
let tarefas=[]

function abrir(id){

document.querySelectorAll(".aba").forEach(function(a){
a.classList.remove("ativa")
})

document.getElementById(id).classList.add("ativa")

}

function addMateria(){

let v=document.getElementById("materia").value

if(v!=""){

materias.push(v)

document.getElementById("materia").value=""

mostrarMaterias()

}

}

function mostrarMaterias(){

let area=document.getElementById("listaMaterias")

area.innerHTML=""

materias.forEach(function(m,i){

area.innerHTML+=m+" <button onclick='delMateria("+i+")'>Excluir</button><br>"

})

}

function delMateria(i){

materias.splice(i,1)

mostrarMaterias()

}

function addHorario(){

let v=document.getElementById("horario").value

if(v!=""){

horarios.push(v)

document.getElementById("horario").value=""

mostrarHorarios()

}

}

function mostrarHorarios(){

let area=document.getElementById("listaHorarios")

area.innerHTML=""

horarios.forEach(function(h,i){

area.innerHTML+=h+" <button onclick='delHorario("+i+")'>Excluir</button><br>"

})

}

function delHorario(i){

horarios.splice(i,1)

mostrarHorarios()

}

function addTarefa(){

let v=document.getElementById("tarefa").value

if(v!=""){

tarefas.push(v)

document.getElementById("tarefa").value=""

mostrarTarefas()

}

}

function mostrarTarefas(){

let area=document.getElementById("listaTarefas")

area.innerHTML=""

tarefas.forEach(function(t,i){

area.innerHTML+=t+" <button onclick='delTarefa("+i+")'>Excluir</button><br>"

})

}

function delTarefa(i){

tarefas.splice(i,1)

mostrarTarefas()

}

</script>

</body>
</html>
