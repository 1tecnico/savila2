<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Mochila Digital</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #e6f0ff;
}

header {
  background: #004aad;
  color: white;
  text-align: center;
  padding: 20px;
  font-size: 28px;
}

.controls {
  padding: 10px;
  background: #cce0ff;
}

.tabs {
  display: flex;
  flex-wrap: wrap;
  background: #007bff;
}

.tab {
  padding: 10px;
  cursor: pointer;
  color: white;
  border: 1px solid #0056b3;
}

.tab:hover {
  background: #0056b3;
}

.content {
  display: none;
  padding: 20px;
}

.active {
  display: block;
}

input, select {
  padding: 8px;
  margin: 5px 0;
  width: 100%;
}

button {
  padding: 8px;
  margin: 5px 0;
  border: none;
  background: #007bff;
  color: white;
  border-radius: 5px;
  cursor: pointer;
}

button:hover {
  background: #004aad;
}

ul {
  list-style: none;
  padding: 0;
}

li {
  background: #cce0ff;
  margin: 5px 0;
  padding: 10px;
  border-radius: 5px;
}
</style>

</head>
<body>

<header>🎒 Mochila Digital</header>

<div class="controls">
  <input type="text" id="nomeDisciplina" placeholder="Nome da disciplina">

  <select id="turno">
    <option>Matutino</option>
    <option>Vespertino</option>
  </select>

  <select id="dia">
    <option>Segunda</option>
    <option>Terça</option>
    <option>Quarta</option>
    <option>Quinta</option>
    <option>Sexta</option>
  </select>

  <button onclick="addDisciplina()">Adicionar Disciplina</button>
</div>

<div class="tabs" id="tabs"></div>
<div id="conteudos"></div>

<script>
let dados = JSON.parse(localStorage.getItem("mochilaDigital")) || [];

function salvar() {
  localStorage.setItem("mochilaDigital", JSON.stringify(dados));
}

function render() {
  const tabs = document.getElementById("tabs");
  const conteudos = document.getElementById("conteudos");

  tabs.innerHTML = "";
  conteudos.innerHTML = "";

  dados.forEach((disc, i) => {

    // ABA
    const tab = document.createElement("div");
    tab.className = "tab";
    tab.innerText = `${disc.nome} (${disc.turno} - ${disc.dia})`;
    tab.onclick = () => abrir(i);
    tabs.appendChild(tab);

    // CONTEÚDO
    const div = document.createElement("div");
    div.className = "content";
    if (i === 0) div.classList.add("active");

    div.innerHTML = `
      <h2>${disc.nome}</h2>
      <p><b>${disc.turno}</b> | ${disc.dia}</p>

      <input type="text" id="tarefa-${i}" placeholder="Nova tarefa">
      <button onclick="addTarefa(${i})">Adicionar tarefa</button>

      <ul>
        ${disc.tarefas.map((t, ti) => `
          <li>
            ${t}
            <button onclick="removerTarefa(${i}, ${ti})">❌</button>
          </li>
        `).join("")}
      </ul>

      <input type="text" id="horario-${i}" placeholder="Ex: 08:00 - 09:00">
      <button onclick="addHorario(${i})">Adicionar horário</button>

      <ul>
        ${disc.horarios.map((h, hi) => `
          <li>
            ${h}
            <button onclick="removerHorario(${i}, ${hi})">❌</button>
          </li>
        `).join("")}
      </ul>

      <button onclick="removerDisciplina(${i})">Excluir disciplina</button>
    `;

    conteudos.appendChild(div);
  });

  salvar();
}

function abrir(index) {
  document.querySelectorAll(".content").forEach(c => c.classList.remove("active"));
  document.querySelectorAll(".content")[index].classList.add("active");
}

function addDisciplina() {
  const nome = document.getElementById("nomeDisciplina").value;
  const turno = document.getElementById("turno").value;
  const dia = document.getElementById("dia").value;

  if (!nome) return;

  dados.push({
    nome,
    turno,
    dia,
    tarefas: [],
    horarios: []
  });

  document.getElementById("nomeDisciplina").value = "";
  render();
}

function removerDisciplina(i) {
  dados.splice(i, 1);
  render();
}

function addTarefa(i) {
  const input = document.getElementById("tarefa-" + i);
  if (!input.value) return;

  dados[i].tarefas.push(input.value);
  input.value = "";
  render();
}

function removerTarefa(i, ti) {
  dados[i].tarefas.splice(ti, 1);
  render();
}

function addHorario(i) {
  const input = document.getElementById("horario-" + i);
  if (!input.value) return;

  dados[i].horarios.push(input.value);
  input.value = "";
  render();
}

function removerHorario(i, hi) {
  dados[i].horarios.splice(hi, 1);
  render();
}

render();
</script>

</body>
</html>
