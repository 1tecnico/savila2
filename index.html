<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Mochila Digital</title>

<style>

body{
font-family: Arial;
background:#1f3a5f;
margin:0;
color:white;
}

header{
background:#0f2745;
padding:15px;
text-align:center;
font-size:24px;
}

.tabs{
display:flex;
background:#16345a;
}

.tab{
flex:1;
padding:12px;
cursor:pointer;
border:none;
background:#16345a;
color:white;
font-size:16px;
}

.tab:hover{
background:#244a78;
}

.content{
display:none;
padding:20px;
}

.active{
display:block;
}

button{
background:#244a78;
color:white;
border:none;
padding:6px 10px;
margin:4px;
cursor:pointer;
border-radius:4px;
}

button:hover{
background:#3566a3;
}

input{
padding:6px;
margin:5px;
border-radius:4px;
border:none;
}

.card{
background:#16345a;
padding:10px;
margin:10px 0;
border-radius:6px;
}

</style>
</head>

<body>

<header>🎒 Mochila Digital</header>

<div class="tabs">
<button class="tab" onclick="abrir('materias')">Matérias</button>
<button class="tab" onclick="abrir('horarios')">Horários</button>
<button class="tab" onclick="abrir('tarefas')">Tarefas</button>
</div>

<!-- MATERIAS -->
<div id="materias" class="content active">

<h2>Adicionar Matéria</h2>

<input id="novaMateria" placeholder="Nome da matéria">
<button onclick="addMateria()">Adicionar</button>

<div id="listaMaterias"></div>

</div>

<!-- HORARIOS -->
<div id="horarios" class="content">

<h2>Adicionar Horário</h2>

<input id="materiaHorario" placeholder="Matéria">
<input id="horaHorario" placeholder="Ex: Segunda 08:00">
<button onclick="addHorario()">Adicionar</button>

<div id="listaHorarios"></div>

</div>

<!-- TAREFAS -->
<div id="tarefas" class="content">

<h2>Adicionar Tarefa</h2>

<input id="novaTarefa" placeholder="Descrição da tarefa">
<button onclick="addTarefa()">Adicionar</button>

<div id="listaTarefas"></div>

</div>

<script>

let materias = JSON.parse(localStorage.getItem("materias")) || [];
let horarios = JSON.parse(localStorage.getItem("horarios")) || [];
let tarefas = JSON.parse(localStorage.getItem("tarefas")) || [];

function salvar(){
localStorage.setItem("materias",JSON.stringify(materias));
localStorage.setItem("horarios",JSON.stringify(horarios));
localStorage.setItem("tarefas",JSON.stringify(tarefas));
}

function abrir(id){

document.querySelectorAll(".content").forEach(c=>{
c.classList.remove("active")
})

document.getElementById(id).classList.add("active")

}

function renderMaterias(){

let div = document.getElementById("listaMaterias")
div.innerHTML=""

materias.forEach((m,i)=>{

div.innerHTML+=`
<div class="card">
${m}
<button onclick="delMateria(${i})">Excluir</button>
</div>
`

})

}

function addMateria(){

let nome=document.getElementById("novaMateria").value

if(nome!=""){

materias.push(nome)

document.getElementById("novaMateria").value=""

salvar()

renderMaterias()

}

}

function delMateria(i){

materias.splice(i,1)

salvar()

renderMaterias()

}

function renderHorarios(){

let div=document.getElementById("listaHorarios")

div.innerHTML=""

horarios.forEach((h,i)=>{

div.innerHTML+=`
<div class="card">
${h.materia} - ${h.hora}
<button onclick="delHorario(${i})">Excluir</button>
</div>
`

})

}

function addHorario(){

let materia=document.getElementById("materiaHorario").value
let hora=document.getElementById("horaHorario").value

if(materia!="" && hora!=""){

horarios.push({materia,hora})

document.getElementById("materiaHorario").value=""
document.getElementById("horaHorario").value=""

salvar()

renderHorarios()

}

}

function delHorario(i){

horarios.splice(i,1)

salvar()

renderHorarios()

}

function renderTarefas(){

let div=document.getElementById("listaTarefas")

div.innerHTML=""

tarefas.forEach((t,i)=>{

div.innerHTML+=`
<div class="card">
${t}
<button onclick="delTarefa(${i})">Excluir</button>
</div>
`

})

}

function addTarefa(){

let tarefa=document.getElementById("novaTarefa").value

if(tarefa!=""){

tarefas.push(tarefa)

document.getElementById("novaTarefa").value=""

salvar()

renderTarefas()

}

}

function delTarefa(i){

tarefas.splice(i,1)

salvar()

renderTarefas()

}

renderMaterias()
renderHorarios()
renderTarefas()

</script>

</body>
</html>
